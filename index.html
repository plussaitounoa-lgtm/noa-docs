<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noa Docs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
    header { background: #1a1a2e; color: white; padding: 40px 32px 32px; }
    header h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    header p { color: #aaa; font-size: 14px; }
    main { max-width: 800px; margin: 40px auto; padding: 0 24px; }
    .section-title { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 40px; }
    .card { background: white; border-radius: 10px; padding: 20px; text-decoration: none; color: inherit; border: 1px solid #e8e8e8; transition: box-shadow 0.15s, transform 0.15s; display: block; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-2px); }
    .card-icon { font-size: 28px; margin-bottom: 12px; }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .card-desc { font-size: 13px; color: #666; line-height: 1.5; }
    footer { text-align: center; padding: 40px; color: #bbb; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>Noa Docs</h1>
    <p>LINEマーケチーム｜ドキュメント置き場</p>
  </header>
  <main>
    <p class="section-title">ガイド</p>
    <div class="card-grid">
      <a class="card" href="task-setup.html">
        <div class="card-icon">📋</div>
        <div class="card-title">タスク管理セットアップ</div>
        <div class="card-desc">tasks.json の操作方法・manage.py コマンド一覧</div>
      </a>
    </div>
  </main>
  <footer>Noa Docs — plussaitounoa-lgtm.github.io/noa-docs</footer>
</body>
</html>
